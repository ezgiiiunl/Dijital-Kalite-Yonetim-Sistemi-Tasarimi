<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KYS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
            * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        background: #f3f6fb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    }

    /* ===== WRAPPER ===== */
    .wrapper {
        display: flex;
        min-height: 100vh;
    }

    /* ===== SIDEBAR (KURUMSAL SOFT) ===== */
    .sidebar {
        width: 270px;
        background: #0f172a;
        color: #e2e8f0;
        padding: 24px 18px;
        border-right: 1px solid rgba(255,255,255,0.06);
    }

    .sidebar h4 {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.4px;
        margin-bottom: 10px;
    }

    .sidebar small {
        color: #94a3b8;
        font-weight: 600;
        letter-spacing: 0.6px;
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
    }

    .sidebar hr {
        border-color: rgba(255,255,255,0.06);
        margin: 14px 0;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #cbd5e1;
        text-decoration: none;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 14px;
        margin-top: 6px;
        transition: all 0.2s ease;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.06);
        color: #fff;
        transform: translateX(3px);
    }

    .sidebar a.active {
        background: #2563eb;
        color: #fff;
        font-weight: 600;
    }

    /* ===== MAIN PANEL ===== */
    .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* ===== NAVBAR ===== */
    .navbar-custom {
        height: 64px;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        padding: 0 22px;
    }

    .navbar-brand {
        font-weight: 700;
        font-size: 16px;
        color: #111827;
        letter-spacing: 0.3px;
    }

    /* ===== CONTENT ===== */
    .content {
        padding: 28px;
    }

    /* ===== PROFILE ===== */
    .profile-img {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e5e7eb;
    }

    /* ===== DROPDOWN ===== */
    .dropdown-menu {
        border-radius: 12px;
        border: 1px solid #eef2f7;
        padding: 8px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    .dropdown-item {
        border-radius: 8px;
        padding: 8px 10px;
        font-size: 14px;
    }

    .dropdown-item:hover {
        background: #f3f4f6;
    }

    /* ===== BADGE ===== */
    .badge {
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 11px;
    }

    /* ===== SCROLL FEEL ===== */
    .content {
        overflow-y: auto;
    }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="sidebar">
        <h4>Panel</h4>
        <hr>

        <small class="text-secondary">MENÜ</small>
        <a href="/"><i class="bi bi-house"></i> Ana Sayfa</a>

        <hr>

        <small>ISO 9001</small>
        <a href="/dokumantasyon"><i class="bi bi-folder"></i> Dökümantasyon</a>
        <a href="/denetim"><i class="bi bi-search"></i> Denetim</a>
        <a href="/dif"><i class="bi bi-exclamation-circle"></i> DİF</a>
        <a href="/uygunsuzluk"><i class="bi bi-x-circle"></i> Uygunsuzluk</a>
        <a href="/ygg"><i class="bi bi-graph-up"></i> YGG</a>
        <a href="/risk"><i class="bi bi-shield-shaded"></i> Risk Yönetimi</a>
        <hr>

        <small>Diğer</small>

        <a href="/oneriler"><i class="bi bi-lightbulb"></i> İyileştirme</a>
        <a href="surec"><i class="bi bi-clock"></i> Süreç Yönetimi</a>

    </div>

    <div class="main-panel">

        <nav class="navbar-custom shadow-sm px-3">
            <div class="container-fluid d-flex justify-content-between align-items-center">
                <span class="navbar-brand mb-0 h1 fw-bold text-dark">Kalite Yönetim Sistemi</span>

                <div class="d-flex align-items-center">
                    <div class="text-end me-3">
                        <span class="badge {% if session.get('rol') == 'editor' %}bg-primary{% else %}bg-secondary{% endif %} d-block">
                            {{ session.get('rol', 'Ziyaretçi')|capitalize }}
                        </span>
                    </div>

                    <div class="dropdown">
                        <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Ezgi+Unal&background=1e293b&color=fff" alt="Profil" class="profile-img">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                            <li><h6 class="dropdown-header">Ezgi Ünal</h6></li>
                            <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profilim</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item text-danger" href="/cikis"><i class="bi bi-box-arrow-right me-2"></i>Çıkış Yap</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>

        <div class="content">

            {% block icerik %}{% endblock %}
        </div>

    </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
